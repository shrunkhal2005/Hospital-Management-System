# Server Configuration
server.port=${PORT:8080}

# Database configuration
# If SPRING_DATASOURCE_URL is set (Postgres/MySQL), it will be used.
# If not set, Spring Boot will auto-configure an embedded H2 database (runtime-only dependency).
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA/Hibernate Configuration
# Leave `spring.jpa.database-platform` unset so Hibernate auto-detects the dialect from the JDBC URL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
